project = "6_Flux_International"
root = "/data/ssd1/swim"

[paths]
project_workspace = "{root}/{project}"
data = "{project_workspace}/data"
gis = "{data}/gis"
fields_shapefile = "{gis}/flux_crop_pub_75_150m.shp"
properties = "{data}/properties"
lulc = "{properties}/{project}_landcover_crop.csv"
hwsd = "{properties}/{project}_hwsd_crop.csv"
properties_json = "{properties}/{project}_properties.json"

remote_sensing = "{data}/remote_sensing"
landsat = "{remote_sensing}/landsat"
sentinel = "{remote_sensing}/sentinel"
ecostress = "{remote_sensing}/ecostress"

container = "{data}/{project}_triple_etf_por.swim"

[paths.era5]
met = "{data}/meteorology/era5_crop"
extracts = "{data}/meteorology/era5_crop/extracts"

[earth_engine]
bucket = "wudr"

[ids]
feature_id = "sid"

[data_sources]
met_source = "era5"
snow_source = "era5"
soil_source = "hwsd"
mask_mode = "none"

[era5land]
params = ["swe", "eto", "tmean", "tmin", "tmax", "precip", "srad"]
param_mapping = { precip = "prcp" }

[misc]
irrigation_threshold = 0.3
elev_units = "m"
refet_type = "eto"
runoff_process = "cn"

[date_range]
start_date = "2013-01-01"
end_date = "2025-12-31"

[crop_coefficient]
kc_proxy = "etf"
cover_proxy = "ndvi"

[calibration]
pest_run_dir = "{project_workspace}/pestrun_triple_etf_por"
workers = 20
realizations = 200
calibration_dir = "{pest_run_dir}/pest/mult"
obs_folder = "{pest_run_dir}/obs"
initial_values_csv = "{pest_run_dir}/params.csv"
spinup = "{pest_run_dir}/spinup.json"

prior_regularization_fraction = 0.8

# Pre-merged triple ETf: nanmean(Landsat SSEBop, Landsat PT-JPL, ECOSTRESS PT-JPL)
# No ensemble_members — target is pre-computed at merged/triple/no_mask
etf_target_model = "triple"
etf_target_instrument = "merged"
